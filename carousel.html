<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossos momentos</title>
    <link rel="stylesheet" href="css/carousel.css">
</head>
<body>
    <div class="floating-hearts" aria-hidden="true"></div>

    <main class="page-content">
        <h1>Nossos momentos</h1>

        <section class="carousel" aria-label="Carrossel dos nossos momentos">
            <div class="carousel-track"></div>

            <button class="carousel-control previous" type="button" aria-label="Momento anterior">
                &#10094;
            </button>
            <button class="carousel-control next" type="button" aria-label="Proximo momento">
                &#10095;
            </button>
        </section>

        <div class="carousel-status" aria-live="polite"></div>
    </main>

    <script src="js/carousel.js"></script>
</body>
</html>
